; MARS Agent Registry
; Each section defines a service agent that can be spawned.
; cost = free      → auto-spawned when server starts (no API key / money required)
; cost = per-token → only spawned on demand via /spawn
;
; Placeholders in command:
;   {server}  — replaced with the server address (host:port)
;   {workdir} — replaced with this agent's working directory
;
; If this file is missing or has no sections, the server starts with no service agents.

[clock]
description = Clock + location — returns current time and node geolocation as JSON
command = mars-agent-clock
skills = get_time, time, clock, location, geo, datetime
category = service
cost = free
protocol = mcp


[profiler]
description = System profiler — collects CPU / memory / process stats as JSON
command = mars-agent-profiler
skills = get_profile, profiler, profile, performance, memory, cpu
category = service
cost = free
protocol = mcp

[status]
description = Runtime status — exposes agent/scope/problem state as JSON
command = mars-agent-status
skills = get_status, status, protocol, introspection, runtime
category = service
cost = free
protocol = mcp

[math]
description = SymPy math solver — solves equations and evaluates symbolic expressions
command = mars-agent-math
skills = solve_math, math, solve, equation, sympy, algebra, calculus, integrate, differentiate, simplify, factor
category = service
cost = free
protocol = mcp

[scipy]
description = SciPy numerical math — root-finding, quadrature, optimization, linear algebra, statistics, ODEs
command = mars-agent-scipy
skills = solve_scipy, scipy, numerical, quadrature, rootfind, optimize, linalg, ode, statistics, stats
category = service
cost = free
protocol = mcp

; ── Code execution agent ──────────────────────────────────────────────────────
; The code executor is an IN-PLATFORM agent (not a TCP subprocess).
; Spawn it with:  /spawn code
;
; Once running, LLM agents can call run_python(code) to request execution.
; The human operator must approve each request with /approve [request_id].
;
; [code] is shown in /agents available but spawned in-platform, not as a process.
; cost = demand means it is NOT auto-spawned at server start.

[file]
description = File I/O — sandboxed read / write / list / delete / mkdir inside artifacts/fileio/
command = mars-agent-file --workdir {workdir}
skills = file_io, file, read, write, fileio, storage, filesystem, list, delete, append, mkdir
category = service
cost = free
protocol = mcp

[url]
description = URL fetch — HTTP GET / POST any public URL, returns content as JSON
command = mars-agent-url
skills = fetch_url, url, fetch, http, web, get, post, request, download, browse
category = service
cost = free
protocol = mcp

[ollama-models]
description = Ollama models — lists installed and running Ollama models as JSON
command = mars-agent-ollama
skills = list_ollama_models, models, list-models, ollama-models, providers, tags
category = service
cost = free
protocol = mcp

[launcher]
description = Agent launcher — lets LLM agents spawn new agents via the spawn_agent tool
command = mars-agent-launcher
skills = spawn_agent, launch, create_agent
category = service
cost = free
protocol = mcp
; NOTE: This uses the _mars_cmd envelope to trigger server-side spawning —
; no direct TCP connection needed.
;
; Remove or comment out this entry to prevent LLM agents from launching
; other agents dynamically.  Human operators can always use /spawn from
; the CLI regardless of whether this entry is present.

; Bridge agents are for EXTERNAL systems that have no Python SDK — legacy APIs,
; remote tools, or systems that manage their own conversation state.
;
; You do NOT need a bridge agent to use Anthropic, GitHub Copilot, or GitHub
; Models — those are native providers. Spawn them directly:
;
;   /spawn anthropic                        → Claude (claude-sonnet-4-6)
;   /spawn anthropic claude-opus-4-7        → Claude Opus with adaptive thinking
;   /spawn copilot                          → GitHub Copilot Chat (gpt-4o)
;   /spawn github-models                    → GitHub Models free tier
;
; Native LLMAgents participate in rooms, skill routing, autopilot, tools,
; artifacts, and federation. Bridge agents are plain TCP proxies and do not.
;
; [bridge.copilot@1] is kept here as a reference pattern for external systems.
; Remove the leading semicolons to enable it (requires `gh auth login`).

;[bridge.copilot@1]
;description = GitHub Copilot bridge — legacy bridge pattern; prefer /spawn copilot instead
;command = mars-agent-bridge.copilot.1 --server {server}
;skills = copilot, code, assistant, analysis, bridge
;category = bridge
;cost = free
