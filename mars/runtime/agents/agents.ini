category = service
cost = free
protocol = mcp
; NOTE: This uses the _mars_cmd envelope to trigger server-side spawning —
; no direct TCP connection needed.
;
; Remove or comment out this entry to prevent LLM agents from launching
; other agents dynamically.  Human operators can always use /spawn from
; the CLI regardless of whether this entry is present.

; ── External MCP servers ──────────────────────────────────────────────────────
; These agents wrap third-party MCP servers as MARS service agents.
; Each server must be installed separately — see the comment above each entry.
;
; GitHub MCP server — https://github.com/github/github-mcp-server
;
; The binary is NOT shipped with MARS.  Download it once and place it in bin/
; (relative to the project root, which is gitignored):
;
;   Windows x64  — download github-mcp-server_Windows_x86_64.zip from the
;                  releases page, unzip, copy github-mcp-server.exe to bin/
;   Linux x64    — download github-mcp-server_Linux_x86_64.tar.gz, unpack,
;                  copy github-mcp-server to bin/
;   macOS arm64  — download github-mcp-server_Darwin_arm64.tar.gz, unpack,
;                  copy github-mcp-server to bin/
;
;   Releases: https://github.com/github/github-mcp-server/releases/latest
;
; Requires: GITHUB_PERSONAL_ACCESS_TOKEN env var set in .env
;   Value: your GitHub OAuth token (gh auth token) or a PAT with
;   scopes: repo, read:org, read:user
;
; cost = demand — NOT auto-spawned.  Use /spawn github inside the CLI.

[github]
description = GitHub — search repos, read/write files, manage issues, PRs, and workflows via the GitHub API
command = bin/github-mcp-server.exe stdio
;command = bin/github-mcp-server stdio
skills = search_repositories, get_file_contents, create_issue, list_issues, create_pull_request, list_pull_requests, get_issue, create_or_update_file, search_code
category = external
cost = demand
protocol = mcp


; Bridge agents are for EXTERNAL systems that have no Python SDK — legacy APIs,
; remote tools, or systems that manage their own conversation state.
;
; You do NOT need a bridge agent to use Anthropic, GitHub Copilot, or GitHub
; Models — those are native providers. Spawn them directly:
;
;   /spawn anthropic                        → Claude (claude-sonnet-4-6)
;   /spawn anthropic claude-opus-4-7        → Claude Opus with adaptive thinking
;   /spawn copilot                          → GitHub Copilot Chat (gpt-4o)
;
; Native LLMAgents participate in rooms, skill routing, autopilot, tools,
; artifacts, and federation. Bridge agents are plain TCP proxies and do not.
;
; [bridge.copilot@1] is kept here as a reference pattern for external systems.
; Remove the leading semicolons to enable it (requires `gh auth login`).

;[bridge.copilot@1]
;description = GitHub Copilot bridge — legacy bridge pattern; prefer /spawn copilot instead
;command = mars-agent-bridge.copilot.1 --server {server}
;skills = copilot, code, assistant, analysis, bridge
;category = bridge
;cost = free

