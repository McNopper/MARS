; MARS Agent Registry
; Each section defines a provider that can be spawned.
; cost = free    -> auto-spawned when the server starts (no API key / money required)
; cost = demand  -> only spawned on demand via /spawn
;
; Placeholders in command:
;   {server}  -- replaced with the server address (host:port)
;   {workdir} -- replaced with this provider's working directory
;
; If this file is missing or has no sections, the server starts with no providers.
;
; MARS ships a minimal core. The only built-in providers are the two that
; manipulate MARS itself (status + launcher). Everything else is provided by
; attaching standard MCP servers -- see the external examples at the bottom.

; -- Built-in (MARS-specific) --------------------------------------------------

[status]
description = Runtime status -- exposes agent/scope/runtime state as JSON
command = mars-agent-status
skills = get_status, status, protocol, introspection, runtime
category = provider
cost = free
protocol = mcp

[launcher]
description = Agent launcher -- lets LLM agents spawn new agents via the spawn_agent tool
command = mars-agent-launcher
skills = spawn_agent, launch, create_agent
category = provider
cost = free
protocol = mcp
; Remove this entry to prevent LLM agents from launching other agents.
; Human operators can always use /spawn from the CLI regardless.

; -- External MCP servers (examples) -------------------------------------------
; Attach any stdio MCP server here instead of maintaining custom agents.
; Uncomment and adjust as needed.
;
; Filesystem -- read/write/edit/search local files (requires Node.js 18+ / npx)
; [filesystem]
; description = Filesystem -- read, write, edit, list, move, search local files
; command = npx -y @modelcontextprotocol/server-filesystem .
; skills = read_file, write_file, edit_file, list_directory, search_files, move_file, create_directory
; category = external
; cost = free
; protocol = mcp
;
; GitHub -- search repos, read/write files, manage issues/PRs/workflows.
; Download the binary from https://github.com/github/github-mcp-server/releases/latest
; into bin/ and set GITHUB_PERSONAL_ACCESS_TOKEN in .env.
; [github]
; description = GitHub -- search repos, files, issues, PRs, workflows
; command = bin/github-mcp-server.exe stdio
; skills = search_repositories, get_file_contents, create_issue, list_issues, create_pull_request, search_code
; category = external
; cost = demand
; protocol = mcp
